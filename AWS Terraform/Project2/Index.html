<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Load Balancer Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .status {
            background: #4caf50;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin: 20px 0;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .server-info {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
            margin: 30px 0;
        }
        
        .info-item {
            margin: 15px 0;
            font-size: 1.1em;
        }
        
        .label {
            font-weight: bold;
            color: #667eea;
        }
        
        .value {
            color: #333;
            font-family: 'Courier New', monospace;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-left: 10px;
        }
        
        .timestamp {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AWS Demo Server</h1>
        <div class="status">● Server Online</div>
        
        <div class="server-info">
            <div class="info-item">
                <span class="label">Server Instance:</span>
                <span class="value" id="instance-id">Loading...</span>
            </div>
            <div class="info-item">
                <span class="label">Availability Zone:</span>
                <span class="value" id="az">Loading...</span>
            </div>
            <div class="info-item">
                <span class="label">Private IP:</span>
                <span class="value" id="private-ip">Loading...</span>
            </div>
            <div class="info-item">
                <span class="label">Request Count:</span>
                <span class="value" id="request-count">1</span>
            </div>
        </div>
        
        <p class="timestamp">Last Updated: <span id="timestamp"></span></p>
        
        <button class="refresh-btn" onclick="location.reload()">🔄 Refresh Page</button>
    </div>
    
    <script>
        // Update timestamp
        function updateTimestamp() {
            document.getElementById('timestamp').textContent = new Date().toLocaleString();
        }
        
        // Simulate fetching instance metadata (in real AWS, you'd use the metadata service)
        // For actual deployment, replace these with real AWS metadata API calls
        async function loadServerInfo() {
            try {
                // In production, uncomment these to fetch real AWS metadata:
                // const instanceId = await fetch('http://169.254.169.254/latest/meta-data/instance-id').then(r => r.text());
                // const az = await fetch('http://169.254.169.254/latest/meta-data/placement/availability-zone').then(r => r.text());
                // const privateIp = await fetch('http://169.254.169.254/latest/meta-data/local-ipv4').then(r => r.text());
                
                // For demo purposes (replace with actual metadata in AWS):
                document.getElementById('instance-id').textContent = 'i-' + Math.random().toString(36).substr(2, 9);
                document.getElementById('az').textContent = 'us-east-1' + ['a', 'b', 'c'][Math.floor(Math.random() * 3)];
                document.getElementById('private-ip').textContent = '10.0.' + Math.floor(Math.random() * 255) + '.' + Math.floor(Math.random() * 255);
            } catch (error) {
                console.log('Running in demo mode');
            }
        }
        
        // Initialize
        updateTimestamp();
        loadServerInfo();
        
        // Update request count from sessionStorage
        let count = parseInt(sessionStorage.getItem('requestCount') || '0') + 1;
        sessionStorage.setItem('requestCount', count);
        document.getElementById('request-count').textContent = count;
    </script>
</body>
</html>
